name: PR Quality
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  prguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: 1137043480/prguard@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: 'ai'
          ai-provider: 'openai'
          ai-api-key: ${{ secrets.OPENAI_API_KEY }}
          ai-base-url: ${{ secrets.OPENAI_BASE_URL }}
          ai-model: 'gpt-5.3-codex'
          max-failures: 3
          comment-on-pr: 'true'
          disable-auto-exempt: 'true'
          verify-imports: 'true'
          check-code-style: 'true'
          check-pr-history: 'true'
          check-multi-pr: 'true'
