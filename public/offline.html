<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 词汇学习系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .tips {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 20px;
      text-align: left;
      margin-top: 30px;
    }

    .tips h3 {
      color: #333;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .tips ul {
      list-style: none;
      padding: 0;
    }

    .tips li {
      color: #666;
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }

    .tips li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: bold;
    }

    .retry-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: 600;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .connection-status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    .connection-status.online {
      background: #d4edda;
      color: #155724;
    }

    .connection-status.offline {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>您当前处于离线状态</h1>
    <p>无法连接到服务器，请检查您的网络连接。部分已缓存的内容仍可访问。</p>
    
    <button class="retry-button" onclick="location.reload()">
      🔄 重新连接
    </button>

    <div id="connectionStatus" class="connection-status offline">
      🔴 网络连接已断开
    </div>

    <div class="tips">
      <h3>💡 离线模式提示</h3>
      <ul>
        <li>已访问过的页面可以离线查看</li>
        <li>学习进度将在恢复连接后自动同步</li>
        <li>某些功能需要网络连接才能使用</li>
        <li>建议在有网络时预先加载学习内容</li>
      </ul>
    </div>
  </div>

  <script>
    // 监听网络状态变化
    function updateConnectionStatus() {
      const statusDiv = document.getElementById('connectionStatus');
      if (navigator.onLine) {
        statusDiv.className = 'connection-status online';
        statusDiv.innerHTML = '🟢 网络连接已恢复';
        // 3秒后自动刷新
        setTimeout(() => {
          location.reload();
        }, 3000);
      } else {
        statusDiv.className = 'connection-status offline';
        statusDiv.innerHTML = '🔴 网络连接已断开';
      }
    }

    // 初始检查
    updateConnectionStatus();

    // 监听网络状态变化
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);

    // 定期检查网络连接
    setInterval(() => {
      fetch('/', { method: 'HEAD', cache: 'no-cache' })
        .then(() => {
          if (!navigator.onLine) {
            window.dispatchEvent(new Event('online'));
          }
        })
        .catch(() => {
          if (navigator.onLine) {
            window.dispatchEvent(new Event('offline'));
          }
        });
    }, 5000);
  </script>
</body>
</html>
