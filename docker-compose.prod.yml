version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: word-learn-backend
    ports:
      - "5004:5004"
    volumes:
      - ./words_extended.db:/app/words_extended.db
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    container_name: word-learn-frontend
    ports:
      - "3002:3002"
    depends_on:
      - backend
    restart: unless-stopped
